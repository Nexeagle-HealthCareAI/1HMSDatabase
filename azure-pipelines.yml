# azure-pipelines-db.yml
trigger:
  branches:
    include:
      - main
  paths:
    include:
      - db/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - db/**

parameters:
- name: action
  displayName: Action
  type: string
  default: deploy
  values: [ deploy, rollback ]

- name: targetEnv
  displayName: Target Environment
  type: string
  default: dev
  values: [ dev, qa ]

pool:
  vmImage: ubuntu-latest

# Re-usable job steps to avoid duplication
# (YAML anchors are not supported; we just copy steps between stages)

stages:
# ========================= DEV =========================
- stage: Dev
  displayName: "DB: ${{ parameters.action }} → DEV"
  condition: and(succeeded(), eq('${{ parameters.targetEnv }}','dev'))
  variables:
  - group: swa-secrets-dev
  jobs:
  - job: ExecuteDev
    displayName: "Execute SQL (${{ parameters.action }}) - DEV"
    steps:
    - checkout: self
      clean: true

    - bash: |
        set -euo pipefail
        curl https://packages.microsoft.com/keys/microsoft.asc | sudo tee /etc/apt/trusted.gpg.d/microsoft.asc
        curl https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/msprod.list
        sudo apt-get update
        sudo ACCEPT_EULA=Y apt-get install -y mssql-tools18 unixodbc-dev
        echo '##vso[task.prependpath]/opt/mssql-tools18/bin'
      displayName: Install sqlcmd (mssql-tools18)

    - bash: |
        set -euo pipefail
        echo "Action: ${{ parameters.action }}"
        echo "Server: $(SqlServer)"
        echo "DB:     $(DatabaseName)"
        echo "Listing files..."
        ls -1v db/schema/tables/*.sql   2>/dev/null || true
        ls -1v db/schema/indexes/*.sql  2>/dev/null || true
        ls -1v db/dml/seed/*.sql        2>/dev/null || true
        ls -1v db/rollback/*.sql        2>/dev/null || true
      displayName: Inspect file lists

    - bash: |
        set -euo pipefail
        shopt -s nullglob
        if [ "${{ parameters.action }}" != "deploy" ]; then
          echo "Skip deploy for action=${{ parameters.action }}"
          exit 0
        fi
        echo "==> TABLES"
        for f in $(ls -1v db/schema/tables/*.sql); do
          echo "---- $f"
          sqlcmd -C -b -l 60 -I -S "$(SqlServer)" -d "$(DatabaseName)" -U "$(SqlUser)" -P "$(SqlPassword)" -i "$f"
        done
        echo "==> INDEXES"
        for f in $(ls -1v db/schema/indexes/*.sql); do
          echo "---- $f"
          sqlcmd -C -b -l 60 -I -S "$(SqlServer)" -d "$(DatabaseName)" -U "$(SqlUser)" -P "$(SqlPassword)" -i "$f"
        done
        echo "==> DML SEED"
        for f in $(ls -1v db/dml/seed/*.sql); do
          echo "---- $f"
          sqlcmd -C -b -l 60 -I -S "$(SqlServer)" -d "$(DatabaseName)" -U "$(SqlUser)" -P "$(SqlPassword)" -i "$f"
        done
      displayName: DEPLOY Dev (Tables → Indexes → DML)

    - bash: |
        set -euo pipefail
        shopt -s nullglob
        if [ "${{ parameters.action }}" != "rollback" ]; then
          echo "Skip rollback for action=${{ parameters.action }}"
          exit 0
        fi
        echo "==> ROLLBACK"
        for f in $(ls -1v db/rollback/*.sql); do
          echo "---- $f"
          sqlcmd -C -b -l 120 -I -S "$(SqlServer)" -d "$(DatabaseName)" -U "$(SqlUser)" -P "$(SqlPassword)" -i "$f"
        done
      displayName: ROLLBACK Dev

# ========================= QA =========================
- stage: QA
  displayName: "DB: ${{ parameters.action }} → QA"
  condition: and(succeeded(), eq('${{ parameters.targetEnv }}','qa'))
  variables:
  - group: swa-secrets-qa
  jobs:
  - job: ExecuteQA
    displayName: "Execute SQL (${{ parameters.action }}) - QA"
    steps:
    - checkout: self
      clean: true

    - bash: |
        set -euo pipefail
        curl https://packages.microsoft.com/keys/microsoft.asc | sudo tee /etc/apt/trusted.gpg.d/microsoft.asc
