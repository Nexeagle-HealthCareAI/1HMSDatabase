# ================= PROD Gate (manual + IST time) =================
- stage: Prod_Gate
  displayName: "DB: PROD gate (manual + date gate IST)"
  dependsOn: QA
  condition: >
    and(
      succeeded(),
      startsWith(variables['Build.SourceBranch'], 'refs/heads/release-'),
      eq('${{ parameters.deployProd }}','true')
    )
  jobs:
  # 1) Manual approval MUST be a server (agentless) job
  - job: WaitForApproval
    displayName: "Manual approval (agentless)"
    pool: server
    timeoutInMinutes: 4320   # up to 3 days
    steps:
    - task: ManualValidation@0
      displayName: 'Approve PROD DB deployment'
      inputs:
        notifyUsers: ''      # optional emails
        instructions: |
          Approve DB PROD deploy.
          Release time (IST): ${{ parameters.prodReleaseDateIst }}
        onTimeout: 'reject'

  # 2) Time gate runs on a normal agent AFTER approval
  - job: TimeGate
    displayName: "Wait until PROD release time (IST)"
    dependsOn: WaitForApproval
    steps:
    - bash: |
        set -euo pipefail
        REL_IST='${{ parameters.prodReleaseDateIst }}'

        if [ -z "$REL_IST" ]; then
          echo "No prodReleaseDateIst provided; continuing without time gate."
          exit 0
        fi

        target_epoch=$(TZ=Asia/Kolkata date -d "$REL_IST" +%s 2>/dev/null || true)
        if [ -z "$target_epoch" ]; then
          echo "Invalid prodReleaseDateIst. Use 'YYYY-MM-DD HH:MM:SS' (IST)."
          exit 1
        fi

        echo "Target release (IST): $REL_IST"
        echo "Current (IST): $(TZ=Asia/Kolkata date +'%Y-%m-%d %H:%M:%S %Z')"

        now_epoch=$(date +%s)
        while [ "$now_epoch" -lt "$target_epoch" ]; do
          rem=$(( target_epoch - now_epoch ))
          printf 'Waiting %s seconds until %s IST...\n' "$rem" "$REL_IST"
          sleep 15
          now_epoch=$(date +%s)
        done

        echo "Reached release time (IST). Proceeding to PROD DB deploy."
