# azure-pipelines-db.yml
trigger:
  branches: { include: [ main ] }
  paths:    { include: [ db/** ] }

pr:
  branches: { include: [ main ] }
  paths:    { include: [ db/** ] }

parameters:
- name: action
  type: string
  default: deploy
  values: [ deploy, rollback ]

- name: targetEnv
  type: string
  default: dev
  values: [ dev, qa ]

- name: qaEnvironmentName
  type: string
  default: QA   # Create this Environment in DevOps and add approvals if desired

pool: { vmImage: ubuntu-latest }

# ---------- Reusable step templates (inline) ----------
# Installs sqlcmd for Ubuntu 22.04/24.04 reliably and puts it on PATH
steps_install_sqlcmd: &steps_install_sqlcmd
  - bash: |
      set -euo pipefail
      export DEBIAN_FRONTEND=noninteractive
      sudo apt-get update -y
      sudo apt-get install -y curl gnupg apt-transport-https software-properties-common

      # Detect Ubuntu version and use the matching Microsoft repo
      . /etc/os-release
      case "$VERSION_ID" in
        22.04) MS_LIST_URL="https://packages.microsoft.com/config/ubuntu/22.04/prod.list" ;;
        24.04) MS_LIST_URL="https://packages.microsoft.com/config/ubuntu/24.04/prod.list" ;;
        *)     MS_LIST_URL="https://packages.microsoft.com/config/ubuntu/22.04/prod.list" ;;
      esac

      curl -fsSL https://packages.microsoft.com/keys/microsoft.asc \
        | gpg --dearmor \
        | sudo tee /etc/apt/trusted.gpg.d/microsoft.gpg >/dev/null
      curl -fsSL "$MS_LIST_URL" \
        | sudo tee /etc/apt/sources.list.d/microsoft-prod.list >/dev/null

      sudo apt-get update -y
      sudo ACCEPT_EULA=Y apt-get install -y mssql-tools18 unixodbc-dev

      echo '##vso[task.prependpath]/opt/mssql-tools18/bin'
      sqlcmd -? >/dev/null
      echo "sqlcmd installed at: $(command -v sqlcmd)"
    displayName: Install sqlcmd

# Runs a folder (flat) of .sql files in order; deploy or rollback
steps_execute_sql: &steps_execute_sql
  - bash: |
      set -euo pipefail
      export PATH="$PATH:/opt/mssql-tools18/bin"
      export SQLCMDPASSWORD="$(SqlPassword)"
      ROOT="$(Build.SourcesDirectory)"

      # Strong diagnostics: print all severities, echo T-SQL
      SQLCMD=(sqlcmd -S "$(SqlServer)" -d "$(DatabaseName)" -U "$(SqlUser)" -b -l 60 -I -r 1 -m -1 -e)
      # If you sit behind a TLS-intercepting proxy, temporarily add:  SQLCMD+=(-C)

      echo "Server: $(SqlServer)"
      echo "DB    : $(DatabaseName)"
      echo "User  : $(SqlUser)"
      test -n "$(SqlServer)"    || { echo "SqlServer not set"; exit 1; }
      test -n "$(DatabaseName)" || { echo "DatabaseName not set"; exit 1; }
      test -n "$(SqlUser)"      || { echo "SqlUser not set"; exit 1; }
      test -n "$(SqlPassword)"  || { echo "SqlPassword not set"; exit 1; }

      echo "== File inventory (flat per folder) =="
      for d in \
        "$ROOT/db/schema" \
        "$ROOT/db/schema/tables" \
        "$ROOT/db/schema/indexes" \
        "$ROOT/db/schema/views" \
        "$ROOT/db/schema/procs" \
        "$ROOT/db/data/seed" \
        "$ROOT/db/rollback"
      do
        if [ -d "$d" ]; then
          echo "-- $d"
          find "$d" -maxdepth 1 -type f -name "*.sql" | sort || true
        else
          echo "-- $d (missing)"
        fi
      done
      echo "====================="

      list_files_flat() {
        local dir="$1"
        [ -d "$dir" ] || return 0
        find "$dir" -maxdepth 1 -type f -name "*.sql" -print0 | sort -z
      }

      run_dir_flat() {
        local dir="$1" label="$2"
        if [ ! -d "$dir" ]; then echo "SKIP (missing): $dir"; return 0; fi
        echo "==> $label : $dir"
        local any=0
        while IFS= read -r -d '' f; do
          any=1
          echo "---- RUN: ${f#$ROOT/}"
          "${SQLCMD[@]}" -i "$f"
        done < <(list_files_flat "$dir")
        [ $any -eq 0 ] && echo "No .sql files in $dir"
      }

      if [ "${{ parameters.action }}" = "deploy" ]; then
        # Order matters
        run_dir_flat "$ROOT/db/schema"         "SCHEMA root"
        run_dir_flat "$ROOT/db/schema/tables"  "TABLES"
        run_dir_flat "$ROOT/db/schema/indexes" "INDEXES"
        run_dir_flat "$ROOT/db/schema/views"   "VIEWS"
        run_dir_flat "$ROOT/db/schema/procs"   "PROCS"
        run_dir_flat "$ROOT/db/data/seed"      "SEED"
      else
        run_dir_flat "$ROOT/db/rollback"       "ROLLBACK"
      fi

      echo "Completed (${{ parameters.action }})"
    displayName: Execute SQL

# ================= DEV =================
stages:
- stage: Dev
  displayName: "DB: ${{ parameters.action }} → DEV"
  condition: ${{ eq(parameters.targetEnv, 'dev') }}
  variables:
  - group: 'swa-secrets-dev'
  jobs:
  - job: DevJob
    displayName: "Run DB scripts (DEV)"
    steps:
    - checkout: self
      clean: true
    - <<: *steps_install_sqlcmd
    - <<: *steps_execute_sql

# ================= QA (approval-gated via Environment) =================
- stage: QA
  displayName: "DB: ${{ parameters.action }} → QA"
  condition: ${{ eq(parameters.targetEnv, 'qa') }}
  variables:
  - group: 'swa-secrets-qa'
  jobs:
  - deployment: QaDeploy
    displayName: "Run DB scripts (QA)"
    environment: ${{ parameters.qaEnvironmentName }}  # Gate with approvals in DevOps Environments
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
            clean: true
          - <<: *steps_install_sqlcmd
          - <<: *steps_execute_sql
