# azure-pipelines.yml

trigger:
  branches: { include: [ main ] }

pr:
  branches: { include: [ main ] }

# 1) Define parameters BEFORE they are referenced anywhere
parameters:
- name: environment
  type: string
  default: dev
  values: [ dev, qa ]
- name: action
  type: string
  default: deploy
  values: [ deploy, seed-only, rollback ]

# 2) Variable groups selected via template conditionals (compile-time)
variables:
- ${{ if eq(parameters.environment, 'dev') }}:
  - group: swa-secrets-dev
- ${{ if eq(parameters.environment, 'qa') }}:
  - group: swa-secrets-qa

stages:
- stage: Deploy_${{ parameters.environment }}
  displayName: "DB ${{ parameters.environment }} – ${{ parameters.action }}"
  jobs:
  - job: run_sql
    displayName: "Execute SQL scripts with sqlcmd"
    pool:
      vmImage: ubuntu-latest
    container: mcr.microsoft.com/mssql-tools:18-ubuntu-22.04

    steps:
    - checkout: self
      clean: true

    - script: |
        echo "Env: ${{ parameters.environment }}"
        echo "Action: ${{ parameters.action }}"
        echo "Server: $(serverName)"
        echo "DB: $(databaseName)"
        echo "User: $(sqlUser)"
        test -n "$(sqlPassword)" || { echo "sqlPassword missing"; exit 1; }
      displayName: Sanity check

    - script: |
        set -euo pipefail
        export PATH="/opt/mssql-tools18/bin:/opt/mssql-tools/bin:$PATH"
        export SQLCMDPASSWORD="$(sqlPassword)"
        ROOT="$(Build.SourcesDirectory)"
        SQLCMD="sqlcmd -S $(serverName) -d $(databaseName) -U $(sqlUser) -b -l 60 -I"

        run_dir () {
          local dir="$1"
          if [ -d "$dir" ]; then
            echo "==> $dir"
            mapfile -t files < <(find "$dir" -type f -name "*.sql" | sort)
            for f in "${files[@]}"; do
              echo "---- $(realpath --relative-to="$ROOT" "$f")"
              $SQLCMD -i "$f"
            done
          fi
        }

        case "${{ parameters.action }}" in
          deploy)
            run_dir "$ROOT/db/schema"
            run_dir "$ROOT/db/schema/tables"
            run_dir "$ROOT/db/schema/indexes"
            run_dir "$ROOT/db/data/seed"
            ;;
          seed-only)
            run_dir "$ROOT/db/data/seed"
            ;;
          rollback)
            run_dir "$ROOT/db/rollback"
            ;;
        esac
      displayName: Run sqlcmd over scripts
