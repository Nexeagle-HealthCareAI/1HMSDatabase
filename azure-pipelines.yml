trigger:
  branches:
    include:
      - main
  paths:
    include:
      - db/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - db/**

# Choose once at queue time:
# - action: deploy | rollback
# - targetEnv: dev | qa
parameters:
- name: action
  displayName: Action
  type: string
  default: deploy
  values:
    - deploy
    - rollback

- name: targetEnv
  displayName: Target Environment
  type: string
  default: dev
  values:
    - dev
    - qa

# Map variable groups by environment
variables:
- ${{ if eq(parameters.targetEnv, 'dev') }}:
  - group: easyhms-dev-db
- ${{ if eq(parameters.targetEnv, 'qa') }}:
  - group: easyhms-qa-db

pool:
  vmImage: 'ubuntu-latest'

stages:
- stage: RunDB
  displayName: 'DB: ${{ parameters.action }} → ${{ parameters.targetEnv | upper }}'
  jobs:
  - job: Execute
    displayName: 'Execute SQL (${{ parameters.action }})'
    steps:

    # 1) Checkout
    - checkout: self
      clean: true

    # 2) Install sqlcmd (mssql-tools18) on Ubuntu agent
    - bash: |
        set -euo pipefail
        curl https://packages.microsoft.com/keys/microsoft.asc | sudo tee /etc/apt/trusted.gpg.d/microsoft.asc
        curl https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/msprod.list
        sudo apt-get update
        sudo ACCEPT_EULA=Y apt-get install -y mssql-tools18 unixodbc-dev
        echo '##vso[task.prependpath]/opt/mssql-tools18/bin'
      displayName: 'Install sqlcmd (mssql-tools18)'

    # 3) Sanity: show what will run
    - bash: |
        set -euo pipefail
        echo "Env: ${{ parameters.targetEnv }}"
        echo "Action: ${{ parameters.action }}"
        echo "SQL Server: $(SqlServer)"
        echo "Database:   $(DatabaseName)"
        echo "Files (tables):"
        ls -1v db/schema/tables/*.sql || true
        echo "Files (indexes):"
        ls -1v db/schema/indexes/*.sql || true
        echo "Files (dml seed):"
        ls -1v db/dml/seed/*.sql || true
        echo "Files (rollback):"
        ls -1v db/rollback/*.sql || true
      displayName: 'List files'

    # 4) DEPLOY path (tables → indexes → DML) — idempotent scripts recommended
    - bash: |
        set -euo pipefail
        shopt -s nullglob

        if [ "${{ parameters.action }}" != "deploy" ]; then
          echo "Skipping deploy phase (action=${{ parameters.action }})"
          exit 0
        fi

        echo "==> Running TABLE CREATE scripts..."
        for f in $(ls -1v db/schema/tables/*.sql); do
          echo "---- RUN (TABLE): $f"
          sqlcmd -C -b -l 60 -I -S "$(SqlServer)" -d "$(DatabaseName)" -U "$(SqlUser)" -P "$(SqlPassword)" -i "$f"
        done

        echo "==> Running INDEX scripts..."
        for f in $(ls -1v db/schema/indexes/*.sql); do
          echo "---- RUN (INDEX): $f"
          sqlcmd -C -b -l 60 -I -S "$(SqlServer)" -d "$(DatabaseName)" -U "$(SqlUser)" -P "$(SqlPassword)" -i "$f"
        done

        echo "==> Running DML SEED scripts..."
        for f in $(ls -1v db/dml/seed/*.sql); do
          echo "---- RUN (DML): $f"
          sqlcmd -C -b -l 60 -I -S "$(SqlServer)" -d "$(DatabaseName)" -U "$(SqlUser)" -P "$(SqlPassword)" -i "$f"
        done
      displayName: 'DEPLOY: Tables → Indexes → DML'

    # 5) ROLLBACK path (run everything under db/rollback in order)
    - bash: |
        set -euo pipefail
        shopt -s nullglob

        if [ "${{ parameters.action }}" != "rollback" ]; then
          echo "Skipping rollback phase (action=${{ parameters.action }})"
          exit 0
        fi

        echo "==> RUNNING ROLLBACK scripts (ordered)..."
        for f in $(ls -1v db/rollback/*.sql); do
          echo "---- RUN (ROLLBACK): $f"
          sqlcmd -C -b -l 120 -I -S "$(SqlServer)" -d "$(DatabaseName)" -U "$(SqlUser)" -P "$(SqlPassword)" -i "$f"
        done
      displayName: 'ROLLBACK: Drop FKs/Tables/Sequences'
