# easyHMSDatabase – SQL deploy via sqlcmd in container

trigger:
  branches: { include: [ main ] }
  paths:
    include:
      - db/*
      - pipelines/*
      - pipelines/azure-pipelines-db.yml
      - pipelines/vars.*.yml

pr:
  branches: { include: [ main ] }
  paths:
    include:
      - db/*
      - pipelines/*

parameters:
  - name: environment
    displayName: Target environment
    type: string
    default: dev
    values: [ dev, qa ]

  - name: action
    displayName: What to run
    type: string
    default: deploy
    values: [ deploy, seed-only, rollback ]

# Pull secrets from Library → Variable groups
variables:
  - ${{ if eq(parameters.environment, 'dev') }}:
    - group: 'swa-secrets-dev'
  - ${{ if eq(parameters.environment, 'qa') }}:
    - group: 'swa-secrets-qa'

stages:
- stage: Deploy_${{ parameters.environment }}
  displayName: "DB ${{ parameters.environment }} – ${{ parameters.action }}"
  jobs:
  - job: run_sql
    displayName: "Execute SQL scripts with sqlcmd"
    pool:
      vmImage: 'ubuntu-latest'
    container: mcr.microsoft.com/mssql-tools:latest

    steps:
    - checkout: self
      clean: true

    - script: |
        echo "Validating variables for ${{ parameters.environment }}..."
        echo "Server: $(serverName)"
        echo "Database: $(databaseName)"
        echo "User: $(sqlUser)"
        # DO NOT echo the password
        test -n "$(serverName)"    || { echo "serverName not set"; exit 1; }
        test -n "$(databaseName)"  || { echo "databaseName not set"; exit 1; }
        test -n "$(sqlUser)"       || { echo "sqlUser not set"; exit 1; }
        test -n "$(sqlPassword)"   || { echo "sqlPassword not set"; exit 1; }
      displayName: "Sanity check (masked)"

    - script: |
        set -euo pipefail

        export SQLCMDPASSWORD="$(sqlPassword)"   # prefer env var over -P
        ROOT="$(Build.SourcesDirectory)"
        SCHEMA_DIR="$ROOT/db/schema"
        SEED_DIR="$ROOT/db/data/seed"
        ROLLBACK_DIR="$ROOT/db/rollback"

        # -b: abort on error, -l: login timeout, -I: quoted identifiers on
        SQLCMD="sqlcmd -S $(serverName) -d $(databaseName) -U $(sqlUser) -b -l 60 -I"

        run_dir () {
          local dir="$1"
          if [ -d "$dir" ]; then
            echo "==> Running scripts in $dir"
            files=$(git -C "$ROOT" ls-files -- "$dir/*.sql" | sort || true)
            if [ -z "$files" ]; then
              files=$(find "$dir" -maxdepth 1 -type f -name "*.sql" | sort || true)
            fi
            if [ -z "$files" ]; then
              echo "No .sql files found in $dir"
              return 0
            fi
            for f in $files; do
              echo "---- sqlcmd: $(basename "$f")"
              $SQLCMD -i "$f"
            done
          else
            echo "Directory $dir not found (skipping)"
          fi
        }

        case "${{ parameters.action }}" in
          deploy)
            run_dir "$SCHEMA_DIR"
            run_dir "$SEED_DIR"
            ;;
          seed-only)
            run_dir "$SEED_DIR"
            ;;
          rollback)
            run_dir "$ROLLBACK_DIR"
            ;;
          *)
            echo "Unknown action"; exit 2
            ;;
        esac

        echo "All done."
      displayName: "Run sqlcmd over scripts"
