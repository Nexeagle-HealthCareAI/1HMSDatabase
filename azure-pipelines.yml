trigger:
  branches: { include: [ main ] }

parameters:
- name: action
  type: string
  default: deploy
  values: [ deploy, seed-only, rollback ]

stages:
# ---------------- DEV ----------------
- stage: Deploy_dev
  displayName: "DB dev – ${{ parameters.action }}"
  condition: eq(variables['Build.SourceBranch'], 'refs/heads/main')
  variables:
  - group: swa-secrets-dev
  jobs:
  - deployment: DevDeploy
    environment: DEV
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
          - script: |
              echo "Deploying to DEV..."
              # run your sqlcmd step(s) here
            displayName: Run sqlcmd (DEV)

# ---------------- QA (approval-gated) ----------------
- stage: Deploy_qa
  displayName: "DB qa – ${{ parameters.action }}"
  dependsOn: Deploy_dev
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  variables:
  - group: swa-secrets-qa
  jobs:
  - deployment: QaDeploy
    environment: QA     # <— approvals/checks are attached to this env
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
          - script: |
              echo "Deploying to QA..."
              # run your sqlcmd step(s) here
            displayName: Run sqlcmd (QA)
