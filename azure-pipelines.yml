# azure-pipelines-db.yml
trigger:
  branches:
    include: [ main ]
  paths:
    include: [ db/** ]

pr:
  branches:
    include: [ main ]
  paths:
    include: [ db/** ]

parameters:
- name: action
  displayName: Action
  type: string
  default: deploy
  values: [ deploy, rollback ]

- name: targetEnv
  displayName: Target Environment
  type: string
  default: dev
  values: [ dev, qa ]

pool:
  vmImage: ubuntu-latest

# ---------------------------------------------
# Variables (selected once based on targetEnv)
# ---------------------------------------------
variables:
- ${{ if eq(parameters.targetEnv, 'dev') }}:
  - group: 'swa-secrets-dev'
- ${{ if eq(parameters.targetEnv, 'qa') }}:
  - group: 'swa-secrets-qa'
# Required keys in the selected group:
#   SqlServer, DatabaseName, SqlUser, SqlPassword

stages:
- stage: DB
  displayName: "DB: ${{ parameters.action }} → ${{ upper(parameters.targetEnv) }}"
  jobs:
  - job: Execute
    displayName: "Execute SQL (${{ parameters.action }}) - ${{ upper(parameters.targetEnv) }}"
    steps:
    - checkout: self
      clean: true

    # Install sqlcmd (tools v18)
    - bash: |
        set -euo pipefail
        curl https://packages.microsoft.com/keys/microsoft.asc | sudo tee /etc/apt/trusted.gpg.d/microsoft.asc
        curl https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/msprod.list
        sudo apt-get update
        sudo ACCEPT_EULA=Y apt-get install -y mssql-tools18 unixodbc-dev
        echo '##vso[task.prependpath]/opt/mssql-tools18/bin'
        which sqlcmd || true
        sqlcmd -? || true
      displayName: Install sqlcmd (mssql-tools18)

    # Show what we’re about to run
    - bash: |
        set -euo pipefail
        echo "Env:       ${{ parameters.targetEnv }}"
        echo "Action:    ${{ parameters.action }}"
        echo "Server:    $(SqlServer)"
        echo "Database:  $(DatabaseName)"
        echo "Listing files (if any):"
        ls -1v db/schema/tables/*.sql   2>/dev/null || true
        ls -1v db/schema/indexes/*.sql  2>/dev/null || true
        ls -1v db/dml/seed/*.sql        2>/dev/null || true
        ls -1v db/rollback/*.sql        2>/dev/null || true
      displayName: Inspect file lists

    # Deploy path: Tables -> Indexes -> DML
    - bash: |
        set -euo pipefail
        shopt -s nullglob

        if [ "${{ parameters.action }}" != "deploy" ]; then
          echo "Skip deploy for action=${{ parameters.action }}"
          exit 0
        fi

        run_folder () {
          local title="$1"; shift
          local pattern="$1"; shift

          echo "==> ${title}"
          files=( ${pattern} )
          if [ ${#files[@]} -eq 0 ]; then
            echo "No files found for ${title}; skipping."
            return 0
          fi

          for f in "${files[@]}"; do
            echo "---- $f"
            sqlcmd -C -b -l 60 -I \
              -S "$(SqlServer)" -d "$(DatabaseName)" -U "$(SqlUser)" -P "$(SqlPassword)" \
              -i "$f"
          done
        }

        run_folder "TABLES"   "db/schema/tables/*.sql"
        run_folder "INDEXES"  "db/schema/indexes/*.sql"
        run_folder "DML SEED" "db/dml/seed/*.sql"
      displayName: DEPLOY (Tables → Indexes → DML)

    # Rollback path
    - bash: |
        set -euo pipefail
        shopt -s nullglob

        if [ "${{ parameters.action }}" != "rollback" ]; then
          echo "Skip rollback for action=${{ parameters.action }}"
          exit 0
        fi

        echo "==> ROLLBACK"
        files=( db/rollback/*.sql )
        if [ ${#files[@]} -eq 0 ]; then
          echo "No rollback scripts found; skipping."
          exit 0
        fi

        for f in "${files[@]}"; do
          echo "---- $f"
          sqlcmd -C -b -l 120 -I \
            -S "$(SqlServer)" -d "$(DatabaseName)" -U "$(SqlUser)" -P "$(SqlPassword)" \
            -i "$f"
        done
      displayName: ROLLBACK
