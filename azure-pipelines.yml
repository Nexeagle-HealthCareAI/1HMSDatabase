# azure-pipelines-db.yml
trigger:
  branches: { include: [ main ] }
  paths:    { include: [ db/** ] }

pr:
  branches: { include: [ main ] }
  paths:    { include: [ db/** ] }

parameters:
- name: action
  type: string
  default: deploy
  values: [ deploy, rollback ]

- name: targetEnv
  type: string
  default: dev
  values: [ dev, qa ]

- name: qaEnvironmentName
  type: string
  default: QA

pool: { vmImage: ubuntu-latest }

stages:
# ================= DEV =================
- stage: Dev
  displayName: "DB: ${{ parameters.action }} → DEV"
  condition: ${{ eq(parameters.targetEnv, 'dev') }}
  variables:
  - group: 'swa-secrets-dev'   # expects: SqlServer, DatabaseName, SqlUser, SqlPassword
  jobs:
  - job: ExecuteDev
    displayName: "Execute SQL (${{ parameters.action }}) - DEV"
    steps:
    - checkout: self
      clean: true

    # Install sqlcmd (Ubuntu 24.04 repo + dearmored key)
    - bash: |
        set -euo pipefail
        export DEBIAN_FRONTEND=noninteractive
        sudo apt-get update
        sudo apt-get install -y curl gnupg apt-transport-https software-properties-common

        curl -fsSL https://packages.microsoft.com/keys/microsoft.asc \
          | gpg --dearmor \
          | sudo tee /etc/apt/trusted.gpg.d/microsoft.gpg >/dev/null
        curl -fsSL https://packages.microsoft.com/config/ubuntu/24.04/prod.list \
          | sudo tee /etc/apt/sources.list.d/microsoft-prod.list >/dev/null

        sudo apt-get update
        sudo ACCEPT_EULA=Y apt-get install -y mssql-tools18 unixodbc-dev

        export PATH="$PATH:/opt/mssql-tools18/bin"
        echo '##vso[task.prependpath]/opt/mssql-tools18/bin'

        /opt/mssql-tools18/bin/sqlcmd -? >/dev/null
        echo "sqlcmd installed at: $(command -v sqlcmd)"
      displayName: Install sqlcmd (DEV)

    # Connectivity warm-up
    - bash: |
        set -euo pipefail
        export PATH="$PATH:/opt/mssql-tools18/bin"

        echo "Server: $(SqlServer)"
        echo "DB    : $(DatabaseName)"
        echo "User  : $(SqlUser)"
        test -n "$(SqlServer)"    || { echo "SqlServer not set"; exit 1; }
        test -n "$(DatabaseName)" || { echo "DatabaseName not set"; exit 1; }
        test -n "$(SqlUser)"      || { echo "SqlUser not set"; exit 1; }
        test -n "$(SqlPassword)"  || { echo "SqlPassword not set"; exit 1; }

        export SQLCMDPASSWORD="$(SqlPassword)"
        # Ping master (ignore failure) then target DB (must succeed)
        sqlcmd -S "$(SqlServer)" -d master            -U "$(SqlUser)" -l 30 -I -Q "SELECT 1" || true
        sqlcmd -S "$(SqlServer)" -d "$(DatabaseName)" -U "$(SqlUser)" -l 30 -I -Q "SELECT DB_NAME();"
      displayName: Sanity & connectivity (DEV)

    # Execute (deploy or rollback) – FLAT search per folder (no recursion at root)
    - bash: |
        set -euo pipefail
        export PATH="$PATH:/opt/mssql-tools18/bin"
        export SQLCMDPASSWORD="$(SqlPassword)"
        ROOT="$(Build.SourcesDirectory)"

        # Add "-C" to trust server certs behind a proxy: SQLCMD+=("-C")
        SQLCMD=("sqlcmd" "-S" "$(SqlServer)" "-d" "$(DatabaseName)" "-U" "$(SqlUser)" "-b" "-l" "60" "-I")

        echo "== File inventory (flat per folder) =="
        for d in \
          "$ROOT/db/schema" \
          "$ROOT/db/schema/tables" \
          "$ROOT/db/schema/indexes" \
          "$ROOT/db/schema/views" \
          "$ROOT/db/schema/procs" \
          "$ROOT/db/data/seed" \
          "$ROOT/db/rollback"
        do
          if [ -d "$d" ]; then
            echo "-- $d"
            find "$d" -maxdepth 1 -type f -name "*.sql" | sort || true
          else
            echo "-- $d (missing)"
          fi
        done
        echo "====================="

        list_files_flat() {
          local dir="$1"
          [ -d "$dir" ] || return 0
          find "$dir" -maxdepth 1 -type f -name "*.sql" -print0 | sort -z
        }

        run_with_retry() {
          local file="$1" tries=8 delay=3 attempt=1
          while :; do
            echo "---- RUN: ${file#$ROOT/} (try $attempt/$tries)"
            if "${SQLCMD[@]}" -i "$file"; then return 0; fi
            if [ $attempt -ge $tries ]; then
              echo "FAILED after $tries attempts: $file"
              return 1
            fi
            sleep "$delay"
            delay=$(( delay < 30 ? delay*2 : 30 ))
            attempt=$((attempt+1))
          done
        }

        run_dir_flat() {
          local dir="$1" label="$2"
          if [ ! -d "$dir" ]; then echo "SKIP (missing): $dir"; return 0; fi
          echo "==> $label : $dir"
          local any=0
          while IFS= read -r -d '' f; do
            any=1; run_with_retry "$f"
          done < <(list_files_flat "$dir")
          [ $any -eq 0 ] && echo "No .sql files in $dir"
        }

        if [ "${{ parameters.action }}" = "deploy" ]; then
          run_dir_flat "$ROOT/db/schema"         "SCHEMA root"
          run_dir_flat "$ROOT/db/schema/tables"  "TABLES"
          run_dir_flat "$ROOT/db/schema/indexes" "INDEXES"
          run_dir_flat "$ROOT/db/schema/views"   "VIEWS"
          run_dir_flat "$ROOT/db/schema/procs"   "PROCS"
          run_dir_flat "$ROOT/db/data/seed"      "SEED"
        else
          run_dir_flat "$ROOT/db/rollback"       "ROLLBACK"
        fi

        echo "DEV completed."
      displayName: Execute (${{ parameters.action }}) – DEV

# ================= QA (approval-gated via Environment) =================
- stage: QA
  displayName: "DB: ${{ parameters.action }} → QA"
  condition: ${{ eq(parameters.targetEnv, 'qa') }}
  variables:
  - group: 'swa-secrets-qa'   # expects: SqlServer, DatabaseName, SqlUser, SqlPassword
  jobs:
  - deployment: ExecuteQA
    displayName: "Execute SQL (${{ parameters.action }}) - QA"
    environment: ${{ parameters.qaEnvironmentName }}   # Create 'QA' Environment + approvals
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
            clean: true

          - bash: |
              set -euo pipefail
              export DEBIAN_FRONTEND=noninteractive
              sudo apt-get update
              sudo apt-get install -y curl gnupg apt-transport-https software-properties-common

              curl -fsSL https://packages.microsoft.com/keys/microsoft.asc \
                | gpg --dearmor \
                | sudo tee /etc/apt/trusted.gpg.d/microsoft.gpg >/dev/null
              curl -fsSL https://packages.microsoft.com/config/ubuntu/24.04/prod.list \
                | sudo tee /etc/apt/sources.list.d/microsoft-prod.list >/dev/null

              sudo apt-get update
              sudo ACCEPT_EULA=Y apt-get install -y mssql-tools18 unixodbc-dev

              export PATH="$PATH:/opt/mssql-tools18/bin"
              echo '##vso[task.prependpath]/opt/mssql-tools18/bin'

              /opt/mssql-tools18/bin/sqlcmd -? >/dev/null
              echo "sqlcmd installed at: $(command -v sqlcmd)"
            displayName: Install sqlcmd (QA)

          - bash: |
              set -euo pipefail
              export PATH="$PATH:/opt/mssql-tools18/bin"

              echo "Server: $(SqlServer)"
              echo "DB    : $(DatabaseName)"
              echo "User  : $(SqlUser)"
              test -n "$(SqlServer)"    || { echo "SqlServer not set"; exit 1; }
              test -n "$(DatabaseName)" || { echo "DatabaseName not set"; exit 1; }
              test -n "$(SqlUser)"      || { echo "SqlUser not set"; exit 1; }
              test -n "$(SqlPassword)"  || { echo "SqlPassword not set"; exit 1; }

              export SQLCMDPASSWORD="$(SqlPassword)"
              sqlcmd -S "$(SqlServer)" -d master            -U "$(SqlUser)" -l 30 -I -Q "SELECT 1" || true
              sqlcmd -S "$(SqlServer)" -d "$(DatabaseName)" -U "$(SqlUser)" -l 30 -I -Q "SELECT DB_NAME();"
            displayName: Sanity & connectivity (QA)

          - bash: |
              set -euo pipefail
              export PATH="$PATH:/opt/mssql-tools18/bin"
              export SQLCMDPASSWORD="$(SqlPassword)"
              ROOT="$(Build.SourcesDirectory)"

              SQLCMD=("sqlcmd" "-S" "$(SqlServer)" "-d" "$(DatabaseName)" "-U" "$(SqlUser)" "-b" "-l" "60" "-I")
              # To bypass TLS chain issues temporarily: SQLCMD+=("-C")

              echo "== File inventory (flat per folder) =="
              for d in \
                "$ROOT/db/schema" \
                "$ROOT/db/schema/tables" \
                "$ROOT/db/schema/indexes" \
                "$ROOT/db/schema/views" \
                "$ROOT/db/schema/procs" \
                "$ROOT/db/data/seed" \
                "$ROOT/db/rollback"
              do
                if [ -d "$d" ]; then
                  echo "-- $d"
                  find "$d" -maxdepth 1 -type f -name "*.sql" | sort || true
                else
                  echo "-- $d (missing)"
                fi
              done
              echo "====================="

              list_files_flat() {
                local dir="$1"
                [ -d "$dir" ] || return 0
                find "$dir" -maxdepth 1 -type f -name "*.sql" -print0 | sort -z
              }

              run_with_retry() {
                local file="$1" tries=8 delay=3 attempt=1
                while :; do
                  echo "---- RUN: ${file#$ROOT/} (try $attempt/$tries)"
                  if "${SQLCMD[@]}" -i "$file"; then return 0; fi
                  if [ $attempt -ge $tries ]; then
                    echo "FAILED after $tries attempts: $file"
                    return 1
                  fi
                  sleep "$delay"
                  delay=$(( delay < 30 ? delay*2 : 30 ))
                  attempt=$((attempt+1))
                done
              }

              run_dir_flat() {
                local dir="$1" label="$2"
                if [ ! -d "$dir" ]; then echo "SKIP (missing): $dir"; return 0; fi
                echo "==> $label : $dir"
                local any=0
                while IFS= read -r -d '' f; do
                  any=1; run_with_retry "$f"
                done < <(list_files_flat "$dir")
                [ $any -eq 0 ] && echo "No .sql files in $dir"
              }

              if [ "${{ parameters.action }}" = "deploy" ]; then
                run_dir_flat "$ROOT/db/schema"         "SCHEMA root"
                run_dir_flat "$ROOT/db/schema/tables"  "TABLES"
                run_dir_flat "$ROOT/db/schema/indexes" "INDEXES"
                run_dir_flat "$ROOT/db/schema/views"   "VIEWS"
                run_dir_flat "$ROOT/db/schema/procs"   "PROCS"
                run_dir_flat "$ROOT/db/data/seed"      "SEED"
              else
                run_dir_flat "$ROOT/db/rollback"       "ROLLBACK"
              fi

              echo "QA completed."
            displayName: Execute (${{ parameters.action }}) – QA
