# Variables for DEV. Do not store secrets in git.
# Put secrets (sqlUser, sqlPassword) in a Variable Group or pipeline variables (secret=true).
variables:
  environmentName: 'dev'

  # Azure SQL connection
  serverName: 'easyhmserver.database.windows.net'   # FQDN
  databaseName: 'easyHMSDatabase'

  # Auth (example: SQL auth). Prefer AAD-managed identity if you can.
  sqlUser: '$(dev.sqlUser)'           # reference a Variable Group/secret variable
  sqlPassword: '$(dev.sqlPassword)'   # secret

  # (Optional) naming/metadata
  owner: 'data-platform'
  appName: 'easyHMSDatabase'
